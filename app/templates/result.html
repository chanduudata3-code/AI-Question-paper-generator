<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Generated Questions</h1>

{% for q in questions %}

<div class="card
{% if q.marks == '2' %}two{% endif %}
{% if q.marks == '5' %}five{% endif %}
{% if q.marks == '10' %}ten{% endif %}
">

<b>{{ q.marks }} Marks</b><br>
{{ q.question }}

</div>

{% endfor %}

<a href="/download">
<button>Download PDF</button>
</a>

</div>

</body>
</html>
